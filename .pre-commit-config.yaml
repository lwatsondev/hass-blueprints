---
repos:
  - repo: "local"
    hooks:
      - id: "end-of-file-fixer"
        name: "end-of-file-fixer"
        entry: "uv run end-of-file-fixer"
        language: "system"
        types:
          - "text"

      - id: "trailing-whitespace-fixer"
        name: "trailing-whitespace-fixer"
        entry: "uv run trailing-whitespace-fixer"
        language: "system"
        types:
          - "text"

      - id: "yamllint"
        name: "yamllint"
        entry: "uv run yamllint"
        args:
          - "--strict"
        language: "system"
        types:
          - "yaml"
